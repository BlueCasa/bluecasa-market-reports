name: Monthly Market Report Update

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update-market-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

