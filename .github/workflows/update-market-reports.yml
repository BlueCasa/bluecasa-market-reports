name: Blue Casa Market Update

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update-market-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update date and deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          python3 -c "
          import re, datetime
          label = datetime.datetime.now().strftime('%B %Y')
          html = open('market-reports.html').read()
          html = re.sub(r'Updated <strong>[^<]+</strong>', 'Updated <strong>' + label + '</strong>', html)
          open('market-reports.html', 'w').write(html)
          print('Updated to:', label)
          "
          git config --global user.name "Blue Casa Auto-Update"
          git config --global user.email "info@blue-casa.com"
          git add market-reports.html
          git diff --staged --quiet || git commit -m "Auto-update market reports - $(date +'%B %Y')"
          git push
          npm install -g netlify-cli
          netlify deploy --prod --dir=. --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
